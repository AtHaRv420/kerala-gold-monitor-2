name: Kerala Gold Bot

on:
  schedule:
    # 04:30 UTC = 10:00 AM IST
    - cron: '30 4 * * *'
    # 12:30 UTC = 6:00 PM IST
    - cron: '30 12 * * *'
  workflow_dispatch: # Allows manual trigger from UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Gold Scraper & Bot
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          USER_WHATSAPP: ${{ secrets.USER_WHATSAPP }}
          ADMIN_WHATSAPP: ${{ secrets.ADMIN_WHATSAPP }}
          TEST_MODE: ${{ vars.TEST_MODE || 'false' }}
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
        run: python src/main.py
